services:
  ember:
    build: ./backend
    container_name: ember
    restart: unless-stopped
    # 只绑本机回环，公网访问一律走 Cloudflare Tunnel，端口不裸露
    ports:
      - "127.0.0.1:8300:8000"
    environment:
      # MCP 挂载路径 = 访问密钥，公网必须在 .env 里设成随机长串（见 .env.example）
      - MCP_PATH=${MCP_PATH:-mcp}
      # OAuth 门禁（claude.ai connector 必需，见 .env.example 和 app/oauth.py）
      - EMBER_OAUTH_PASSWORD=${EMBER_OAUTH_PASSWORD:-}
      - EMBER_OAUTH_ACCESS_TOKEN=${EMBER_OAUTH_ACCESS_TOKEN:-}
      - EMBER_OAUTH_REFRESH_TOKEN=${EMBER_OAUTH_REFRESH_TOKEN:-}
      - PUBLIC_HOST=${PUBLIC_HOST:-ember.cloudxuan1.com}
      # 审核台 Bearer 认证（提取脚本 POST 草稿用，与 MCP 的 token 分开）
      - EMBER_REVIEW_TOKEN=${EMBER_REVIEW_TOKEN:-}
      # 语义检索（V5）：KEY 留空 = 语义腿关闭，纯关键词模式（见 .env.example）
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-https://openrouter.ai/api/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen/qwen3-embedding-8b}
    volumes:
      # V2 起 SQLite 数据库放这里（data/ 已 gitignore，永不入库）
      - ./data:/app/data

  # ember 自己的 Cloudflare Tunnel，与旧系统的 ombre-tunnel 完全独立，互不影响
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ember-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - ember
